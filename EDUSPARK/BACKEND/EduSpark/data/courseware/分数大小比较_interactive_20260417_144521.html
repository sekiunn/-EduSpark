<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分数大小比较练习</title>
  <style>
  :root {
  color-scheme: light;
  --bg: #f6f7fb;
  --panel: #ffffff;
  --panel-soft: #f2f5fb;
  --border: #d9e2f2;
  --text: #1f2937;
  --muted: #64748b;
  --primary: #2563eb;
  --primary-soft: #dbeafe;
  --success: #0f766e;
  --success-soft: #ecfdf5;
  --danger: #dc2626;
  --danger-soft: #fef2f2;
  --shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
  --radius: 18px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, #eff6ff 0, transparent 42%),
    linear-gradient(180deg, #f8fbff 0%, #f5f7fb 100%);
  min-height: 100vh;
}
.shell {
  max-width: 980px;
  margin: 0 auto;
  padding: 20px;
}
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 16px;
}
.page-header h1 {
  margin: 0;
  font-size: clamp(24px, 4vw, 34px);
  line-height: 1.15;
}
.page-subtitle {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 14px;
}
.page-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 999px;
  background: var(--primary-soft);
  color: var(--primary);
  font-size: 13px;
  font-weight: 700;
}
.row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.button,
button {
  border: none;
  border-radius: 12px;
  padding: 11px 16px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.button-primary {
  background: var(--primary);
  color: #fff;
}
.button-secondary {
  background: #e2e8f0;
  color: var(--text);
}
.button-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.button-ghost.active {
  border-color: var(--primary);
  background: var(--primary-soft);
  color: var(--primary);
}
.muted {
  color: var(--muted);
}
.panel-title {
  margin: 0 0 10px;
  font-size: 15px;
  font-weight: 700;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}
.stat-card {
  padding: 14px;
  border-radius: 14px;
  background: var(--panel-soft);
  border: 1px solid var(--border);
}
.stat-label {
  color: var(--muted);
  font-size: 13px;
}
.stat-value {
  margin-top: 6px;
  font-size: 20px;
  font-weight: 800;
}
.note-box {
  border-radius: 14px;
  padding: 12px 14px;
  background: var(--success-soft);
  color: var(--success);
  border: 1px solid #bae6d3;
  font-size: 14px;
  font-weight: 700;
}
.danger-box {
  background: var(--danger-soft);
  color: var(--danger);
  border: 1px solid #fecaca;
}
@media (max-width: 760px) {
  .shell { padding: 14px; }
  .page-header { flex-direction: column; }
  .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

  .score-card { margin-bottom: 16px; }
.score-text {
  margin-top: 12px;
  font-size: 18px;
  font-weight: 800;
}
.quiz-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.quiz-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
}
.quiz-card.correct { border-color: #10b981; }
.quiz-card.wrong { border-color: #ef4444; }
.quiz-card h3 {
  margin: 0 0 12px;
  font-size: 17px;
}
.options {
  display: grid;
  gap: 10px;
}
.option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #f8fafc;
}
.option input { margin-top: 3px; }
.short-answer {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  font-size: 15px;
}
.feedback {
  margin-top: 12px;
  padding: 12px 14px;
  border-radius: 12px;
  background: #f8fafc;
  color: var(--muted);
  display: none;
}
.feedback.show { display: block; }

  </style>
</head>
<body>
<div class="shell quiz-shell">
  <header class="page-header">
    <div>
      <h1 id="titleText"></h1>
      <p class="page-subtitle" id="subtitleText"></p>
    </div>
    <div class="row">
      <button class="button button-primary" id="submitBtn">提交答案</button>
      <button class="button button-secondary" id="resetBtn">重新作答</button>
    </div>
  </header>

  <section class="page-card score-card" id="scoreCard">
    <div class="chip">即时反馈</div>
    <div class="score-text" id="scoreText">请先完成题目。</div>
  </section>

  <section class="quiz-list" id="quizList"></section>
</div>

<script>
const spec = {"title":"分数大小比较练习","subtitle":"请选择正确的答案并查看解析","questions":[{"type":"single_choice","prompt":"比较下列两个分数的大小：1/2 和 3/4。","options":["A. 1/2 > 3/4","B. 1/2 < 3/4","C. 1/2 = 3/4","D. 无法确定"],"answer":"B","explanation":"将两个分数转换为相同分母，得到1/2=2/4，显然2/4<3/4，因此选择 B。"},{"type":"true_false","prompt":"判断下列说法是否正确：5/6 和 7/8 的大小关系是前者大于后者。","options":["正确","错误"],"answer":false,"explanation":"将两个分数转换为相同分母，得到5/6=20/24, 7/8=21/24，显然21/24>20/24，因此该说法不正确。"},{"type":"single_choice","prompt":"比较下列两个分数的大小：3/5 和 4/7。","options":["A. 3/5 > 4/7","B. 3/5 < 4/7","C. 3/5 = 4/7","D. 无法确定"],"answer":"A","explanation":"将两个分数转换为相同分母，得到21/35 > 20/35，因此选择 A。"},{"type":"single_choice","prompt":"比较下列两个分数的大小：7/9 和 8/11。","options":["A. 7/9 > 8/11","B. 7/9 < 8/11","C. 7/9 = 8/11","D. 无法确定"],"answer":"A","explanation":"将两个分数转换为相同分母，得到77/99 > 72/99，因此选择 A。"}]};
const questions = Array.isArray(spec.questions) ? spec.questions : [];
const titleEl = document.getElementById('titleText');
const subtitleEl = document.getElementById('subtitleText');
const quizList = document.getElementById('quizList');
const scoreText = document.getElementById('scoreText');
const submitBtn = document.getElementById('submitBtn');
const resetBtn = document.getElementById('resetBtn');

titleEl.textContent = spec.title || '互动练习';
subtitleEl.textContent = spec.subtitle || '完成题目后立即查看得分、答案与解析。';

function normalizeText(value) {
  return String(value ?? '').trim().toLowerCase();
}

function renderQuestions() {
  quizList.innerHTML = '';
  questions.forEach((question, index) => {
    const card = document.createElement('article');
    card.className = 'quiz-card';
    card.dataset.index = String(index);

    const title = document.createElement('h3');
    title.textContent = (index + 1) + '. ' + (question.prompt || '题目');
    card.appendChild(title);

    if (question.type === 'short_text') {
      const input = document.createElement('input');
      input.className = 'short-answer';
      input.type = 'text';
      input.placeholder = '请输入答案';
      input.dataset.answerInput = 'true';
      card.appendChild(input);
    } else {
      const optionsWrap = document.createElement('div');
      optionsWrap.className = 'options';
      const options = Array.isArray(question.options) ? question.options : [];
      options.forEach((option, optionIndex) => {
        const label = document.createElement('label');
        label.className = 'option';
        const input = document.createElement('input');
        input.type = 'radio';
        input.name = 'quiz_' + index;
        input.value = option;
        const text = document.createElement('span');
        text.textContent = String.fromCharCode(65 + optionIndex) + '. ' + option;
        label.appendChild(input);
        label.appendChild(text);
        optionsWrap.appendChild(label);
      });
      card.appendChild(optionsWrap);
    }

    const feedback = document.createElement('div');
    feedback.className = 'feedback';
    feedback.dataset.feedback = 'true';
    card.appendChild(feedback);
    quizList.appendChild(card);
  });
}

function getUserAnswer(card, question, index) {
  if (question.type === 'short_text') {
    return card.querySelector('[data-answerInput="true"]')?.value
      || card.querySelector('[data-answer-input="true"]')?.value
      || '';
  }
  return card.querySelector('input[name="quiz_' + index + '"]:checked')?.value || '';
}

function grade() {
  let correct = 0;
  questions.forEach((question, index) => {
    const card = quizList.children[index];
    const userAnswer = getUserAnswer(card, question, index);
    const expected = question.answer ?? '';
    const isCorrect = normalizeText(userAnswer) === normalizeText(expected);
    card.classList.remove('correct', 'wrong');
    card.classList.add(isCorrect ? 'correct' : 'wrong');
    if (isCorrect) {
      correct += 1;
    }
    const feedback = card.querySelector('[data-feedback="true"]');
    feedback.classList.add('show');
    feedback.textContent = (isCorrect ? '回答正确。' : '回答有误。')
      + ' 正确答案: ' + expected
      + (question.explanation ? '。解析: ' + question.explanation : '');
  });
  scoreText.textContent = '本次得分: ' + correct + ' / ' + questions.length;
}

function reset() {
  renderQuestions();
  scoreText.textContent = '请先完成题目。';
}

submitBtn.addEventListener('click', grade);
resetBtn.addEventListener('click', reset);
renderQuestions();

</script>
</body>
</html>
