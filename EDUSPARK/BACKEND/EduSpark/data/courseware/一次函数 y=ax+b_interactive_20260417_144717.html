<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一次函数 y=ax+b</title>
  <style>
  :root {
  color-scheme: light;
  --bg: #f6f7fb;
  --panel: #ffffff;
  --panel-soft: #f2f5fb;
  --border: #d9e2f2;
  --text: #1f2937;
  --muted: #64748b;
  --primary: #2563eb;
  --primary-soft: #dbeafe;
  --success: #0f766e;
  --success-soft: #ecfdf5;
  --danger: #dc2626;
  --danger-soft: #fef2f2;
  --shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
  --radius: 18px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, #eff6ff 0, transparent 42%),
    linear-gradient(180deg, #f8fbff 0%, #f5f7fb 100%);
  min-height: 100vh;
}
.shell {
  max-width: 980px;
  margin: 0 auto;
  padding: 20px;
}
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 16px;
}
.page-header h1 {
  margin: 0;
  font-size: clamp(24px, 4vw, 34px);
  line-height: 1.15;
}
.page-subtitle {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 14px;
}
.page-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 999px;
  background: var(--primary-soft);
  color: var(--primary);
  font-size: 13px;
  font-weight: 700;
}
.row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.button,
button {
  border: none;
  border-radius: 12px;
  padding: 11px 16px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.button-primary {
  background: var(--primary);
  color: #fff;
}
.button-secondary {
  background: #e2e8f0;
  color: var(--text);
}
.button-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.button-ghost.active {
  border-color: var(--primary);
  background: var(--primary-soft);
  color: var(--primary);
}
.muted {
  color: var(--muted);
}
.panel-title {
  margin: 0 0 10px;
  font-size: 15px;
  font-weight: 700;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}
.stat-card {
  padding: 14px;
  border-radius: 14px;
  background: var(--panel-soft);
  border: 1px solid var(--border);
}
.stat-label {
  color: var(--muted);
  font-size: 13px;
}
.stat-value {
  margin-top: 6px;
  font-size: 20px;
  font-weight: 800;
}
.note-box {
  border-radius: 14px;
  padding: 12px 14px;
  background: var(--success-soft);
  color: var(--success);
  border: 1px solid #bae6d3;
  font-size: 14px;
  font-weight: 700;
}
.danger-box {
  background: var(--danger-soft);
  color: var(--danger);
  border: 1px solid #fecaca;
}
@media (max-width: 760px) {
  .shell { padding: 14px; }
  .page-header { flex-direction: column; }
  .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

  .formula-card { margin-bottom: 16px; }
.formula-text { color: var(--text); line-height: 1.8; }
.explorer-layout {
  display: grid;
  grid-template-columns: 320px minmax(0, 1fr);
  gap: 16px;
}
.controls-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.slider-card {
  padding: 14px;
  border-radius: 14px;
  background: var(--panel-soft);
  border: 1px solid var(--border);
}
.slider-head {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 14px;
  font-weight: 700;
}
.slider-card input { width: 100%; margin-top: 10px; }
.result-panel canvas {
  width: 100%;
  display: block;
  margin-top: 16px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: linear-gradient(180deg, #ffffff, #f8fbff);
}
@media (max-width: 820px) {
  .explorer-layout { grid-template-columns: minmax(0, 1fr); }
}

  </style>
</head>
<body>
<div class="shell parameter-shell">
  <header class="page-header">
    <div>
      <h1 id="titleText"></h1>
      <p class="page-subtitle" id="subtitleText"></p>
    </div>
    <div class="chip">参数实验台</div>
  </header>

  <section class="page-card formula-card">
    <div class="panel-title">公式说明</div>
    <div id="formulaText" class="formula-text"></div>
  </section>

  <section class="explorer-layout">
    <div class="page-card controls-panel" id="controlsPanel"></div>
    <div class="page-card result-panel">
      <div class="stats-grid" id="metricGrid"></div>
      <canvas id="chartCanvas" height="280"></canvas>
      <div id="chartHint" class="scene-hint"></div>
    </div>
  </section>
</div>

<script>
const spec = {"title":"一次函数 y=ax+b","subtitle":"探究参数 a 和 b 对直线的影响","formulaText":"y = ax + b","parameters":[{"key":"a","label":"参数 a","min":-5.0,"max":5.0,"step":0.5,"defaultValue":1.0,"unit":""},{"key":"b","label":"参数 b","min":-5.0,"max":5.0,"step":0.5,"defaultValue":0.0,"unit":""}],"metrics":[{"label":"结果","expression":"a * x","unit":"","precision":2}],"chart":{"xKey":"x","yExpression":"a * x + b","yLabel":"结果值"}};
const parameters = Array.isArray(spec.parameters) ? spec.parameters : [];
const metrics = Array.isArray(spec.metrics) ? spec.metrics : [];
const chart = spec.chart || {};
const titleEl = document.getElementById('titleText');
const subtitleEl = document.getElementById('subtitleText');
const formulaText = document.getElementById('formulaText');
const controlsPanel = document.getElementById('controlsPanel');
const metricGrid = document.getElementById('metricGrid');
const chartHint = document.getElementById('chartHint');
const canvas = document.getElementById('chartCanvas');
const ctx = canvas.getContext('2d');
const values = {};
const valueLabels = {};

titleEl.textContent = spec.title || '参数变化演示';
subtitleEl.textContent = spec.subtitle || '拖动参数，观察结果数值和曲线如何随之变化。';
formulaText.textContent = spec.formulaText || '调整参数并观察结果。';

function buildEvaluator(expression) {
  const keys = parameters.map((parameter) => parameter.key);
  return new Function(...keys, 'Math', 'return (' + expression + ');');
}

function formatNumber(value, precision) {
  if (!Number.isFinite(value)) {
    return '--';
  }
  return Number(value).toFixed(precision ?? 2);
}

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const width = Math.max(320, canvas.clientWidth || 320);
  const height = 280;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function getWidth() {
  return canvas.width / (window.devicePixelRatio || 1);
}

function evaluateExpression(expression, overrideValues) {
  try {
    const evaluator = buildEvaluator(expression);
    const args = parameters.map((parameter) => (overrideValues || values)[parameter.key]);
    const result = evaluator(...args, Math);
    return Number(result);
  } catch (error) {
    return Number.NaN;
  }
}

function renderMetrics() {
  metricGrid.innerHTML = '';
  metrics.forEach((metric) => {
    const card = document.createElement('article');
    card.className = 'stat-card';
    const value = evaluateExpression(metric.expression);
    const label = document.createElement('div');
    label.className = 'stat-label';
    label.textContent = metric.label || '结果';
    const valueEl = document.createElement('div');
    valueEl.className = 'stat-value';
    valueEl.textContent = formatNumber(value, metric.precision ?? 2) + (metric.unit || '');
    card.appendChild(label);
    card.appendChild(valueEl);
    metricGrid.appendChild(card);
  });
}

function drawChart() {
  resizeCanvas();
  const width = getWidth();
  const height = 280;
  ctx.clearRect(0, 0, width, height);
  ctx.strokeStyle = '#cbd5e1';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(46, 18);
  ctx.lineTo(46, height - 34);
  ctx.lineTo(width - 18, height - 34);
  ctx.stroke();

  const xParameter = parameters.find((parameter) => parameter.key === chart.xKey) || parameters[0];
  if (!xParameter) {
    chartHint.textContent = '没有可用于绘图的参数。';
    return;
  }

  const points = [];
  const steps = 60;
  for (let index = 0; index <= steps; index += 1) {
    const ratio = index / steps;
    const xValue = xParameter.min + (xParameter.max - xParameter.min) * ratio;
    const current = { ...values, [xParameter.key]: xValue };
    const yValue = evaluateExpression(chart.yExpression || metrics[0]?.expression || '0', current);
    if (Number.isFinite(yValue)) {
      points.push({ xValue, yValue });
    }
  }
  if (!points.length) {
    chartHint.textContent = '当前表达式无法绘制曲线，请检查参数与公式。';
    return;
  }

  const minY = Math.min(...points.map((point) => point.yValue));
  const maxY = Math.max(...points.map((point) => point.yValue));
  const ySpan = maxY - minY || 1;
  chartHint.textContent = '横轴: ' + (xParameter.label || xParameter.key) + '，纵轴: ' + (chart.yLabel || '结果');

  ctx.strokeStyle = '#2563eb';
  ctx.lineWidth = 3;
  ctx.beginPath();
  points.forEach((point, index) => {
    const x = 46 + ((width - 64) * index) / Math.max(points.length - 1, 1);
    const y = height - 34 - ((point.yValue - minY) / ySpan) * (height - 62);
    if (index === 0) {
      ctx.moveTo(x, y);
    } else {
      ctx.lineTo(x, y);
    }
  });
  ctx.stroke();

  ctx.fillStyle = '#64748b';
  ctx.font = '12px Microsoft YaHei';
  ctx.fillText(String(xParameter.min), 42, height - 12);
  ctx.fillText(String(xParameter.max), width - 38, height - 12);
  ctx.fillText(formatNumber(maxY, 2), 10, 28);
  ctx.fillText(formatNumber(minY, 2), 10, height - 36);
}

function update() {
  Object.entries(valueLabels).forEach(([key, label]) => {
    const parameter = parameters.find((item) => item.key === key);
    label.textContent = formatNumber(values[key], 2) + (parameter?.unit || '');
  });
  renderMetrics();
  drawChart();
}

parameters.forEach((parameter) => {
  values[parameter.key] = Number(parameter.defaultValue ?? 0);
  const card = document.createElement('label');
  card.className = 'slider-card';
  const head = document.createElement('div');
  head.className = 'slider-head';
  const label = document.createElement('span');
  label.textContent = parameter.label || parameter.key;
  const value = document.createElement('strong');
  head.appendChild(label);
  head.appendChild(value);
  card.appendChild(head);
  const slider = document.createElement('input');
  slider.type = 'range';
  slider.min = parameter.min;
  slider.max = parameter.max;
  slider.step = parameter.step || 1;
  slider.value = parameter.defaultValue ?? parameter.min;
  slider.addEventListener('input', () => {
    values[parameter.key] = Number(slider.value);
    update();
  });
  card.appendChild(slider);
  controlsPanel.appendChild(card);
  valueLabels[parameter.key] = value;
});

window.addEventListener('resize', drawChart);
update();

</script>
</body>
</html>
